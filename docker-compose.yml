services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyber_news
      POSTGRES_USER: cyber_news
      POSTGRES_PASSWORD: cyber_news
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber_news -d cyber_news"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  scheduler:
    build: .
    command: ["/usr/local/bin/supercronic", "/app/ops/supercronic/cronjobs"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
